# Generated by `parbaked deploy` from parbaked.toml — do NOT hand-edit.
# To take ownership of this file, run `parbaked eject` and parbaked will
# stop regenerating once it finds Dockerfile/fly.toml at project root.
#
# Cost-protection defaults the starter ships with:
#   auto_stop_machines + min_machines_running=0 → idle pauses → no compute charge
#   max_machines_running cap                    → traffic spike can't autoscale to a bill
#   shared-cpu-1x + 256MB                       → cheapest tier on fly.io
#
# Persistence: SQLite DB lives on a fly volume (parbaked_data → /data),
# survives machine restarts. ``parbaked deploy`` creates the volume on
# first run if it doesn't exist.

app = "callme-dbx7o"
primary_region = "lhr"

[env]
  PARBAKED_ENV = "production"
  PARBAKED_DATABASE_URL = "sqlite:////data/parbaked.db"
  PARBAKED_APP_URL = "https://callme-dbx7o.fly.dev"
  # fly.io's edge is a trusted proxy: it strips inbound X-Forwarded-For
  # before forwarding, so the leftmost value is the real client IP. This
  # lets the rate limiter bucket per-client (not per-edge-IP) and lets the
  # audit log record the actual originating IP. The default is False
  # (safe for raw-uvicorn/VPS deploys); parbaked deploy flips it on here.
  PARBAKED_TRUST_PROXY_HEADERS = "true"

[[mounts]]
  source = "parbaked_data"
  destination = "/data"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  max_machines_running = 2
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    hard_limit = 200
    soft_limit = 100

  # Health check — hits parbaked's built-in /health endpoint.
  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
  cpu_kind = "shared"

# CallMe — single-command quickstart
# Usage: docker compose up --build
# With ngrok: NGROK_AUTHTOKEN=xxx docker compose --profile tunnel up --build

services:
  server:
    build: ./server
    env_file:
      - path: .env
        required: false
      - path: .env.local
        required: false
    environment:
      DATABASE_URL: sqlite:///./data/callme.db
      SEED_DEMO: ${SEED_DEMO:-true}
      NGROK_HOST: tunnels
    volumes:
      - callme-data:/app/data
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  web:
    build: ./web
    ports:
      - "8080:80"
    depends_on:
      server:
        condition: service_healthy

  # Optional ngrok tunnel — activate with: docker compose --profile tunnel up
  tunnels:
    image: ngrok/ngrok:latest
    profiles: ["tunnel"]
    command: http server:3000 --log stdout
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN:-}
    ports:
      - "4040:4040"
    depends_on:
      server:
        condition: service_healthy

volumes:
  callme-data:
